name:
Build Archive Index


on:


 push:


  paths:

   - "content/archive/**"



 workflow_dispatch:



permissions:


 contents:
  write



jobs:


 build:


  runs-on:
   ubuntu-latest



  steps:


  - uses:
      actions/checkout@v4



  - uses:
      actions/setup-node@v4

    with:

      node-version:
       22



  - run:

      npm install gray-matter



  - run:

      node scripts/buildArchiveIndex.js



  - uses:

      stefanzweifel/git-auto-commit-action@v5

    with:


      commit_message:

       update archive index
