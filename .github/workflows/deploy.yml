‚Äãname: Deploy to GitHub Pages
‚Äãon:
push:
branches:
- main
‚Äãpermissions:
contents: read
pages: write
id-token: write
‚Äãconcurrency:
group: "pages"
cancel-in-progress: false
‚Äãjobs:
deploy:
environment:
name: github-pages
url: ${{ steps.deployment.outputs.page_url }}
runs-on: ubuntu-latest
steps:
- name: Checkout Code
uses: actions/checkout@v4
‚Äã- name: Set up Node.js
uses: actions/setup-node@v4
with:
node-version: 20
‚Äã- name: Install Dependencies
run: npm install
‚Äã- name: Build Project
run: npm run build
‚Äã- name: Setup Pages
uses: actions/configure-pages@v4
