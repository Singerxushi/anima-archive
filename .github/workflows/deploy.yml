name: Deploy to GitHub Pages

'on':
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # GitHub Actions cron 使用 UTC；00:00 UTC = 东八区 08:00。
    - cron: '0 0 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update research feed
        run: node scripts/update-research-feed.mjs

      - name: Save research feed snapshot
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/research-feed.json
          if git diff --cached --quiet; then
            echo "Research feed has no changes."
          else
            git commit -m "chore: update research feed [skip ci]"
            git push origin HEAD:main
          fi

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
