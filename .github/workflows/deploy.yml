name: Deploy to GitHub Pages


on:

  push:

    branches:

      - main


  workflow_dispatch:


  schedule:

    # UTC 00:00 = 北京/东八区 08:00

    - cron: "0 0 * * *"



permissions:

  contents: write

  discussions: read

  pages: write

  id-token: write



concurrency:

  group: pages

  cancel-in-progress: false



jobs:


  deploy:


    runs-on: ubuntu-latest



    environment:

      name: github-pages

      url: ${{ steps.deployment.outputs.page_url }}



    steps:



      # -----------------------
      # Checkout
      # -----------------------

      - name: Checkout code

        uses: actions/checkout@v4



      # -----------------------
      # Node
      # -----------------------

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: "24.x"

          cache: npm



      # -----------------------
      # Install
      # -----------------------

      - name: Install dependencies

        run: npm install



      # -----------------------
      # Research Feed
      # -----------------------

      - name: Update research feed

        run: node scripts/update-research-feed.mjs



      # -----------------------
      # Discussions Cache
      # -----------------------

      - name: Sync forum discussions cache

        run: node scripts/update-discussions.mjs

        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



      # -----------------------
      # Save generated data
      # -----------------------

      - name: Save generated data snapshots

        run: |


          git config user.name "github-actions[bot]"


          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"



          git add public/data



          if git diff --cached --quiet; then


            echo "No generated data changes"



          else


            git commit -m "chore: update generated data [skip ci]"


            git push origin HEAD:main



          fi



      # -----------------------
      # Build React
      # -----------------------

      - name: Build project

        run: npm run build



      # -----------------------
      # GitHub Pages
      # -----------------------

      - name: Setup Pages

        uses: actions/configure-pages@v5



      - name: Upload artifact

        uses: actions/upload-pages-artifact@v3

        with:

          path: ./dist



      - name: Deploy

        id: deployment

        uses: actions/deploy-pages@v4
